  - company_id: nestle_au
    name: "Nestlé Australia"
    sector: "FMCG / Food Manufacturing"
    priority_tier: P1
    careers_url: "https://jobs.nestle.com/"
    ats_platform: successfactors
    adapter: generic_html
    active: false   # Official site hard-blocked by Cloudflare Turnstile (confirmed 2026-06: headless AND headful Playwright both stuck on "Just a moment"; curl_cffi chrome124/safari + sitemap.xml + RSS/tile-search/api all 403). Real Nestlé roles are captured instead via the LinkedIn + SEEK company searches below.
    search:
      list_url: "https://jobs.nestle.com/search/?q=quality&locationsearch=Australia"
      base_url: "https://jobs.nestle.com"
      render: true
      wait_selector: "a[href*='/job/']"
      selectors:
        item: "tr.data-row"
        title: "a.jobTitle-link"
        link: "a.jobTitle-link@href"
        location: "span.jobLocation"
      search_terms: ["quality", "food safety"]

