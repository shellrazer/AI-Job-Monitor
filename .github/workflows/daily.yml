name: AI-Job-Monitor Cron

# Modeled on the auto-searcher Car Monitor cron: schedule + concurrency guard,
# restore/save the SQLite DB via actions/cache (no binary git bloat), email
# secrets. Difference: this one also COMMITS & PUSHES the generated HTML report
# back to the repo so you get a versioned daily history (reports/latest.html).
#
# CI coverage note: company ATS APIs (Workday/Phenom/SmartRecruiters/Greenhouse/
# Lever/SuccessFactors) work from GitHub runners; the Cloudflare-protected boards
# (SEEK/Jora/LinkedIn) may be blocked from data-centre IPs and simply skip.

permissions:
  contents: write          # needed to push the report commit

on:
  schedule:
    - cron: "0 20 * * *"   # 20:00 UTC ≈ 06:00 AEST / 07:00 AEDT (Sydney)
  workflow_dispatch:

concurrency:
  group: ai-job-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (incl. Playwright extra)
        run: uv sync --extra browser

      - name: Install Chromium (for JS-rendered ATS sites)
        run: uv run playwright install --with-deps chromium

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-minilm-l6-v2-v1

      # Restore DB (restore-only) — continuity for cross-run dedup + new-only digest.
      - name: Restore jobs.sqlite from cache
        id: dbcache
        uses: actions/cache/restore@v4
        with:
          path: ~/.job_monitor/jobs.sqlite
          key: jobmonitor-db-${{ github.run_id }}
          restore-keys: |
            jobmonitor-db-

      - name: Debug DB before run
        run: |
          ls -lah ~/.job_monitor/jobs.sqlite 2>/dev/null || echo "No DB yet (first run / cache miss)"
          echo "Cache hit? ${{ steps.dbcache.outputs.cache-hit }}"

      - name: Run the monitor
        env:
          # email.enabled=true in config/settings.yaml -> these repo secrets are REQUIRED,
          # else the run fails fast (validate_email_ready). Add them in repo Settings -> Secrets.
          JOB_MONITOR_GMAIL_USER: ${{ secrets.JOB_MONITOR_GMAIL_USER }}
          JOB_MONITOR_GMAIL_APP_PASSWORD: ${{ secrets.JOB_MONITOR_GMAIL_APP_PASSWORD }}
        run: uv run job-monitor run

      - name: Debug DB after run
        run: ls -lah ~/.job_monitor/jobs.sqlite

      # Save DB (save-only). run_id key is unique so the primary key always misses
      # -> a fresh snapshot is saved each run; restore-keys picks the latest prior.
      - name: Save jobs.sqlite to cache
        if: steps.dbcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.job_monitor/jobs.sqlite
          key: jobmonitor-db-${{ github.run_id }}

      - name: Commit & push the report
        run: |
          mkdir -p reports
          latest="$(ls -t ~/.job_monitor/reports/*.html 2>/dev/null | head -1 || true)"
          if [ -n "$latest" ]; then
            cp "$latest" "reports/$(basename "$latest")"
            cp "$latest" reports/latest.html
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: daily job report $(date -u +%F) [skip ci]"
            git push
          fi
