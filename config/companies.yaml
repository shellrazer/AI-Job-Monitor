# Master source list (spec §4 + §7 + §8). Each entry binds an adapter + search params.
#
# adapter: workday | successfactors | smartrecruiters | greenhouse | lever | phenom
#          | generic_html | seek | jora | linkedin
# search flags honored by HTML adapters: impersonate (curl_cffi), render (Playwright headless).
# priority_tier: P1 (big food/FMCG/agribusiness + verified), P2, P3.
#
# Endpoints were live-probed and VERIFIED unless marked. Run `uv run job-monitor validate`
# to re-confirm; selectors marked "approx" should be tuned from its output.

companies:
